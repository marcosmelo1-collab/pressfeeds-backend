name: Atualizador Automatico de Noticias

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Atualizado para a versão recomendada pelo GitHub

      - name: Processar os Feeds
        run: node processar_feeds.js

      - name: Enviar para o Gist
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: a6564ddeec0f72ffeb9918cb5c16a873
          file_path: noticias_final.json
