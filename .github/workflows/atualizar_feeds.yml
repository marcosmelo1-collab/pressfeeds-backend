name: Atualizacao Automatica de Noticias

on:
  push:
    branches:
      - main
  schedule:
    # Atualiza automaticamente de 2 em 2 horas, todos os dias
    - cron: '0 */2 * * *'
  workflow_dispatch: # Mantém o botão manual ativo por segurança

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Copiar o código do repositório
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Traz o histórico completo necessário para o envio

    - name: Configurar o Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar dependências se sobrarem
      run: |
        if [ -f package.json ]; then npm install; fi

    - name: Executar o script de notícias
      run: node processar_feeds.js

    - name: Guardar e enviar alterações de forma limpa para o GitHub
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        
        # 1. Adiciona o arquivo gerado pelo script nesta execução
        git add noticias_final.json
        
        # 2. Verifica se houve alterações reais no JSON.
        # Se houver modificações, cria o commit e força a gravação absoluta.
        # Caso contrário, exibe uma mensagem limpa via echo.
        if ! git diff --cached --quiet; then
          git commit -m "🤖 Atualização automática de notícias [Skip CI]"
          git push origin main --force
        else
          echo "Nenhuma noticia nova detetada nesta rodada. Finalizado com sucesso."
        fi
