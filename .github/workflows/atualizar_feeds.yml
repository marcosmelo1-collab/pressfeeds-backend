name: Atualizacao Automatica de Noticias

on:
  push:
    branches:
      - main
  schedule:
    # Atualiza automaticamente de 2 em 2 horas, todos os dias
    - cron: '0 */2 * * *'
  workflow_dispatch: # Mantém o botão manual ativo por segurança

jobs:
  build:
    runs-on: ubuntu-latest

  steps:
    - name: Copiar o código do repositório
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Traz o histórico completo necessário para o envio

    - name: Configurar o Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar dependências se sobrarem
      run: |
        if [ -f package.json ]; then npm install; fi

    - name: Executar o script de notícias
      run: node processar_feeds.js

    - name: Preparar payload do Gist de forma segura
      run: |
        # Transforma o conteúdo do arquivo JSON gerado em uma string JSON segura para a API do GitHub
        node -e "
          const fs = require('fs');
          const content = fs.readFileSync('noticias_final.json', 'utf8');
          const payload = { files: { 'noticias_final.json': { content: content } } };
          fs.writeFileSync('gist_payload.json', JSON.stringify(payload));
        "

    - name: Atualizar o Gist Público para o Blogger
      run: |
        curl -X PATCH \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Content-Type: application/json" \
          --data-binary @gist_payload.json \
          https://api.github.com/gists/a6564ddeec0f72ffeb9918cb5c16a873
