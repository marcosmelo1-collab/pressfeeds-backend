name: Atualizar Notícias PressFeeds

on:
  schedule:
    - cron: '0 * * * *' # Executa de hora em hora (ou o seu horário atual)
  workflow_dispatch:

# ADICIONE ESTE BLOCO "ENV" LOGO AQUI NO TOPO:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Pode manter a '20' ou mudar para '24' para o seu script
