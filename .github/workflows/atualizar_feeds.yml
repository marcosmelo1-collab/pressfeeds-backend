name: Atualizacao Automatica de Noticias

on:
  push:
    branches:
      - main
  schedule:
    # ATUALIZAÇÃO AGRESSIVA: De 30 em 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch: 

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Copiar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Executar o script de notícias
      run: node processar_feeds.js

    - name: Criar estrutura para o Pages
      run: |
        mkdir -p _site
        cp noticias_final.json _site/

    - name: Enviar para o GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: '_site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
