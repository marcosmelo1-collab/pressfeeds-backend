name: Atualizacao Automatica de Noticias

on:
  push:
    branches:
      - main
  schedule:
    # Atualiza automaticamente de 2 em 2 horas, todos os dias
    - cron: '0 */2 * * *'
  workflow_dispatch: # Mantém o botão manual ativo por segurança

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Copiar o código do repositório
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Traz o histórico completo para sincronização limpa

    - name: Configurar o Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar dependências se sobrarem
      run: |
        if [ -f package.json ]; then npm install; fi

    - name: Executar o script de notícias
      run: node processar_feeds.js

    - name: Guardar e enviar alterações de forma limpa para o GitHub
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        
        # ESTRATÉGIA ANTI-CONFLITO:
        # 1. Atualiza referências do repositório remoto sem tocar nos ficheiros gerados
        git fetch origin main
        
        # 2. Descarta quaisquer conflitos no JSON temporário sincronizando o ponteiro com a nuvem
        git stash -- include-untracked || true
        git pull origin main --rebase -X theirs || true
        git stash pop || true
        
        # 3. Força a adição do ficheiro novo gerado nesta sessão, substituindo o antigo na totalidade
        git add noticias_final.json
        
        # 4. Faz o commit e envia. Se não houver notícias novas, a Action termina em sucesso sem falhar
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Atualização automática de notícias [Skip CI]" && git push origin main)
