name: Atualizador Automatico de Noticias

on:
  schedule:
    # Corre automaticamente a cada 15 minutos
    - cron: '*/15 * * * *'
  workflow_dispatch: # Permite-te clicar num botão para rodar manualmente se quiseres

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Copiar os ficheiros do repositório
        uses: actions/checkout@v3

      - name: Instalar o Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Processar os Feeds e Gerar o JSON
        run: node processar_feeds.js

      - name: Enviar o Super JSON para o Gist do GitHub
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: a6564ddeec0f72ffeb9918cb5c16a873
          file_path: noticias_final.json
          gist_file_name: noticias_final.json
