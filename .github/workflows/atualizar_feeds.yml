name: Atualizacao Automatica de Noticias

on:
  push:
    branches:
      - main
  schedule:
    # Atualiza automaticamente de 2 em 2 horas, todos os dias
    - cron: '0 */2 * * *'
  workflow_dispatch: # Mantém o botão manual ativo por segurança

# Permissões necessárias para o robô conseguir publicar no GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Copiar o código do repositório
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configurar o Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar dependências se sobrarem
      run: |
        if [ -f package.json ]; then npm install; fi

    - name: Executar o script de notícias
      run: node processar_feeds.js

    - name: Criar estrutura para o Pages
      run: |
        mkdir -p _site
        cp noticias_final.json _site/

    - name: Enviar para o GitHub Pages de forma pública
      uses: actions/upload-pages-artifact@v3
      with:
        path: '_site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
